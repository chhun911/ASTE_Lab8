# Private Cloud Storage App — configuration

spring.application.name=private-cloud-storage

# In-memory H2 database (state resets on every restart)
spring.datasource.url=jdbc:h2:mem:cloud;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:cloud)
spring.h2.console.enabled=true

# Permit uploads up to the 50 MB quota, plus headroom for over-quota tests
spring.servlet.multipart.max-file-size=80MB
spring.servlet.multipart.max-request-size=80MB

# Track the session with a cookie only (keeps ;jsessionid= out of URLs)
server.servlet.session.tracking-modes=cookie

# Every new user is granted exactly 50 MB (52,428,800 bytes)
app.storage.default-quota-bytes=52428800
