<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Storage</title>
    <style>
        :root { --accent:#e36b2c; --accent2:#0e7a86; --ink:#1d1a14; --muted:#5f5346; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:system-ui,sans-serif; color:var(--ink); background:#f7f3eb; }
        header {
            display:flex; align-items:center; justify-content:space-between;
            padding:1rem 1.5rem; background:#fff; box-shadow:0 2px 12px rgba(31,20,10,.08);
        }
        header h1 { font-size:1.25rem; margin:0; }
        header .who { color:var(--muted); font-size:.9rem; }
        header a { color:var(--accent2); text-decoration:none; font-weight:600; margin-left:1rem; }
        main { max-width:900px; margin:1.5rem auto; padding:0 1rem; display:grid; gap:1.25rem; }
        .panel { background:#fff; border-radius:14px; padding:1.1rem 1.25rem; box-shadow:0 8px 24px rgba(31,20,10,.06); }
        .panel h2 { margin:0 0 .8rem; font-size:1.05rem; color:var(--accent2); }
        .quota-meter { height:14px; background:#eee3d4; border-radius:999px; overflow:hidden; }
        .quota-fill { height:100%; background:linear-gradient(90deg,var(--accent),#f7a156); }
        .quota-text { margin-top:.5rem; font-size:.9rem; color:var(--muted); }
        .error { background:#fde8e0; color:#a8431a; padding:.6rem .8rem; border-radius:10px; }
        table { width:100%; border-collapse:collapse; }
        th, td { text-align:left; padding:.55rem .5rem; border-bottom:1px solid #efe8da; font-size:.92rem; }
        th { color:var(--accent2); }
        .empty { color:var(--muted); font-style:italic; }
        form.inline { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; margin-top:.5rem; }
        input[type=text], input[type=file] { padding:.5rem; border:1px solid #ddd4c8; border-radius:8px; }
        button { padding:.5rem .9rem; border:none; border-radius:8px; background:var(--accent2); color:#fff; font-weight:600; cursor:pointer; }
        button.danger { background:#c0432a; }
        .row-actions button { padding:.3rem .6rem; font-size:.8rem; }
        a.crumb { color:var(--accent2); text-decoration:none; }
    </style>
</head>
<body>
<header>
    <div>
        <h1>My Cloud Storage</h1>
        <div class="who">Signed in as <strong th:text="${user.email}">user@itc.edu</strong></div>
    </div>
    <nav>
        <a th:href="@{/dashboard}">Home</a>
        <a th:href="@{/logout}">Sign out</a>
    </nav>
</header>

<main>
    <div th:if="${error}" class="panel error" data-testid="error" th:text="${error}">error</div>

    <!-- Quota -->
    <section class="panel">
        <h2>Storage</h2>
        <div class="quota-meter">
            <div class="quota-fill" th:style="'width:' + ${usedPercent} + '%'"></div>
        </div>
        <div class="quota-text">
            Using <strong th:text="${usedMb}">0.0</strong> MB of
            <strong data-testid="quota" th:text="${quotaMb} + ' MB'">50 MB</strong>
            (<span th:text="${usedPercent}">0</span>%)
        </div>
    </section>

    <!-- Folders -->
    <section class="panel">
        <h2>Folders</h2>
        <p th:if="${folders.isEmpty()}" class="empty" data-testid="no-folders">No folders yet.</p>
        <table th:unless="${folders.isEmpty()}">
            <thead><tr><th>Name</th><th></th></tr></thead>
            <tbody>
            <tr th:each="f : ${folders}">
                <td><a class="crumb" th:href="@{/dashboard(folder=${f.id})}" th:text="${f.name}">folder</a></td>
                <td class="row-actions">
                    <form method="post" th:action="@{'/folders/' + ${f.id} + '/delete'}">
                        <input type="hidden" name="parentId" th:value="${currentFolder}">
                        <button class="danger" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <form class="inline" method="post" th:action="@{/folders}">
            <input type="hidden" name="parentId" th:value="${currentFolder}">
            <input type="text" name="name" placeholder="New folder name" required data-testid="folder-name">
            <button type="submit" data-testid="create-folder">Create folder</button>
        </form>
    </section>

    <!-- Files -->
    <section class="panel">
        <h2>Files</h2>
        <p th:if="${files.isEmpty()}" class="empty" data-testid="no-files">No files in this folder.</p>
        <table th:unless="${files.isEmpty()}">
            <thead><tr><th>Name</th><th>Size</th><th></th></tr></thead>
            <tbody>
            <tr th:each="file : ${files}">
                <td th:text="${file.name}">file.txt</td>
                <td th:text="${#numbers.formatDecimal(file.sizeBytes / 1024.0, 1, 1)} + ' KB'">1.0 KB</td>
                <td class="row-actions">
                    <a class="crumb" th:href="@{'/files/' + ${file.id} + '/download'}">download</a>
                    <form method="post" th:action="@{'/files/' + ${file.id} + '/delete'}" style="display:inline">
                        <input type="hidden" name="folderId" th:value="${currentFolder}">
                        <button class="danger" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <form class="inline" method="post" enctype="multipart/form-data" th:action="@{/files}">
            <input type="hidden" name="folderId" th:value="${currentFolder}">
            <input type="file" name="file" required data-testid="file-input">
            <button type="submit" data-testid="upload">Upload</button>
        </form>
    </section>

    <!-- Account -->
    <section class="panel">
        <h2>Account</h2>
        <form method="post" th:action="@{/account/delete}"
              onsubmit="return confirm('Delete your account and all data?');">
            <button class="danger" type="submit" data-testid="delete-account">Delete my account</button>
        </form>
    </section>
</main>
</body>
</html>
